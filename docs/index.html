<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '',
      repo: 'https://github.com/GGXXMM/fe-knowledge',
      basePath: '/fe-knowledge/', // github pages 部署时使用
      // 关键2：自动生成侧边栏（读取当前页面的 h1/h2/h3）
      subMaxLevel: 3, // 解析到 h3 标题，可设 1/2/3
      // 关键3：自动将 README.md 的 h1 作为页面标题
      // 可选：侧边栏折叠
      collapseSidebar: true,
      // 可选：搜索功能
      search: {
        placeholder: '搜索知识库',
        depth: 3
      },
      // 配置代码预览插件（可选，自定义样式）
      codePreview: {
        maxHeight: '600px', // 预览框最大高度
        theme: 'vue' // 高亮主题（vue/dark/okaidia 等）
      },
      /** 绝对路径配置 */
      // alias 配置，让 JS 文件指向静态路径
      // alias: {
      //   // 匹配所有 .js 文件，指向静态文件地址
      //   '/.+/\\.js$': function (path) {
      //     // 拼接完整静态文件 URL
      //     return 'https://ggxxmm.github.io/fe-knowledge/' + path.replace(/^\/\.\/|^\//, '');
      //   }
      // },
      /** 相对路径配置 */
       // 核心1：路由别名 - 批量映射短路径→真实长路径
      alias: {
        // 正则匹配所有 /xxx.js 短路径
        '/(.+\\.js)$': function (match, fileName) {
          // 所有算法子目录（完整列表）
          const algorithmDirs = [
            '字符串', '数组', '链表', '栈', '队列', '树', '二叉树', 
            '递归', '二分查找', 'DFS+BFS', '回溯算法', '动态规划', '贪心算法'
          ];

          // 策略1：按文件名关键词精准匹配子目录（推荐，避免匹配错误）
          for (const dir of algorithmDirs) {
            // 若文件名包含子目录关键词，优先匹配该目录
            if (fileName.includes(dir)) {
              return `/常考算法题/${dir}/${fileName}`;
            }
          }

          // 策略2：兜底 - 按目录顺序匹配（若文件名无关键词）
          for (const dir of algorithmDirs) {
            return `/常考算法题/${dir}/${fileName}`;
          }

          // 最终兜底：返回原路径避免404
          return `/${fileName}`;
        }
      },

      // 核心2：路由拦截 - 拦截短路径JS请求，跳转真实静态文件
      router: {
        beforeEach: function (path) {
          // 匹配规则：根路径的JS文件（无子目录、非相对路径）
          if (path.endsWith('.js') && !path.includes('/') && !path.startsWith('./')) {
            const fileName = path.replace('/', ''); // 提取纯文件名
            const algorithmDirs = [
              '字符串', '数组', '链表', '栈', '队列', '树', '二叉树', 
              '递归', '二分查找', 'DFS+BFS', '回溯算法', '动态规划', '贪心算法'
            ];

            // 拼接真实静态文件地址
            let actualPath = '';
            // 优先按文件名关键词匹配子目录
            for (const dir of algorithmDirs) {
              if (fileName.includes(dir)) {
                actualPath = window.$docsify.basePath + `常考算法题/${dir}/${fileName}`;
                break;
              }
            }

            // 若无关键词匹配，取第一个目录兜底
            if (!actualPath) {
              actualPath = window.$docsify.basePath + `常考算法题/${algorithmDirs[0]}/${fileName}`;
            }

            // 打开新标签页访问真实JS文件，阻止Docsify路由解析
            window.open(actualPath, '_blank');
            return '';
          }
        }
      },

      // 核心3：插件 - 自动替换Markdown中的短路径链接为GitHub Pages绝对地址
      plugins: [
        function (hook, vm) {
          // 所有算法子目录（与上面保持一致）
          const algorithmDirs = [
            '字符串', '数组', '链表', '栈', '队列', '树', '二叉树', 
            '递归', '二分查找', 'DFS+BFS', '回溯算法', '动态规划', '贪心算法'
          ];

          // 从repo地址解析GitHub用户名
          const repoUrl = window.$docsify.repo;
          const userName = repoUrl.match(/github\.com\/([^\/]+)\//)?.[1].toLowerCase() || 'ggxxmm';
          const repoName = repoUrl.match(/github\.com\/[^\/]+\/([^\/]+)/)?.[1] || 'fe-knowledge';
          const gitHubPagesBase = `https://${userName}.github.io/${repoName}`;

          // 解析Markdown后替换短路径链接
          hook.afterEach(function (html) {
            // 匹配Markdown中的 ./xxx.js 短路径
            const shortLinkReg = /<a href="(\.\/[^\/]+\.js)"/g;

            return html.replace(shortLinkReg, function (match, shortPath) {
              const fileName = shortPath.replace('./', '');
              let subDir = '';

              // 优先按文件名关键词匹配子目录
              for (const dir of algorithmDirs) {
                if (fileName.includes(dir)) {
                  subDir = dir;
                  break;
                }
              }

              // 兜底：取第一个目录
              if (!subDir) {
                subDir = algorithmDirs[0];
              }

              // 拼接完整的GitHub Pages绝对URL
              const fullUrl = `${gitHubPagesBase}/常考算法题/${subDir}/${fileName}`;

              // 添加target="_blank"在新标签页打开
              return `<a href="${fullUrl}" target="_blank" rel="noopener noreferrer"`;
            });
          });
        }
      ]
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
