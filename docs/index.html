<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '',
      repo: 'https://github.com/GGXXMM/fe-knowledge',
      basePath: '/fe-knowledge/', // github pages 部署时使用
      // 关键2：自动生成侧边栏（读取当前页面的 h1/h2/h3）
      subMaxLevel: 3, // 解析到 h3 标题，可设 1/2/3
      // 关键3：自动将 README.md 的 h1 作为页面标题
      // 可选：侧边栏折叠
      collapseSidebar: true,
      // 可选：搜索功能
      search: {
        placeholder: '搜索知识库',
        depth: 3
      },
      // 配置代码预览插件（可选，自定义样式）
      codePreview: {
        maxHeight: '600px', // 预览框最大高度
        theme: 'vue' // 高亮主题（vue/dark/okaidia 等）
      },
      /** 绝对路径配置 */
      // alias 配置，让 JS 文件指向静态路径
      alias: {
        // 匹配所有 .js 文件，返回对应的拼接完整路径
        '/(.+\\.js)$': function (match, fileName) {
          // 从repo地址解析GitHub用户名
          const repoUrl = window.$docsify.repo;
          const userName = repoUrl.match(/github\.com\/([^\/]+)\//)?.[1].toLocaleLowerCase() || 'ggxxmm';
          const repoName = repoUrl.match(/github\.com\/[^\/]+\/([^\/]+)/)?.[1] || 'fe-knowledge';
          const gitHubPagesBase = `https://${userName}.github.io/${repoName}`;

          // 所有算法子目录（完整列表）
          const algorithmDirs = [
            '字符串', '数组', '链表', '栈', '队列', '树', '二叉树', 
            '递归', '二分查找', 'DFS+BFS', '回溯算法', '动态规划', '贪心算法'
          ];

          let subDir = '';

          // 优先按文件名关键词匹配子目录
          for (const dir of algorithmDirs) {
            if (fileName.includes(dir)) {
              subDir = dir;
              break;
            }
          }

          // 兜底：取第一个目录
          if (!subDir) {
            subDir = algorithmDirs[0];
          }

          // 拼接完整的GitHub Pages绝对URL
          return `${gitHubPagesBase}/常考算法题/${subDir}/${fileName}`;
        }
      },
      // 路由配置：拦截 JS 文件请求，直接跳转到 GitHub Pages
      router: {
        beforeEach: function (path) {
          // 匹配所有 .js 文件路径
          if (path.endsWith('.js')) {
            // 从repo地址解析GitHub用户名
            const repoUrl = window.$docsify.repo;
            const userName = repoUrl.match(/github\.com\/([^\/]+)\//)?.[1] || 'ggxxmm';
            const repoName = repoUrl.match(/github\.com\/[^\/]+\/([^\/]+)/)?.[1] || 'fe-knowledge';
            const gitHubPagesBase = `https://${userName}.github.io/${repoName}`;

            // 所有算法子目录（完整列表）
            const algorithmDirs = [
              '字符串', '数组', '链表', '栈', '队列', '树', '二叉树', 
              '递归', '二分查找', 'DFS+BFS', '回溯算法', '动态规划', '贪心算法'
            ];

            // 提取文件名（去掉前导 /）
            const fileName = path.replace(/^\//, '');
            let subDir = '';

            // 优先按文件名关键词匹配子目录
            for (const dir of algorithmDirs) {
              if (fileName.includes(dir)) {
                subDir = dir;
                break;
              }
            }

            // 兜底：取第一个目录
            if (!subDir) {
              subDir = algorithmDirs[0];
            }

            // 拼接完整的GitHub Pages绝对URL
            const fullUrl = `${gitHubPagesBase}/常考算法题/${subDir}/${fileName}`;

            // 在新标签页打开外部链接，阻止 Docsify 路由
            window.open(fullUrl, '_blank');
            return false; // 阻止路由处理
          }
        }
      },
      // 代码高亮
      plugins: [
        function (hook, vm) {
          hook.beforeEach(function (html) {
            return html
          })
        }
      ]
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
